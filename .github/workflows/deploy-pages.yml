# Publishes the Vite build to GitHub Pages via the official Actions API.
#
# REQUIRED (one-time): Repo → Settings → Pages → Build and deployment → Source:
#   select "GitHub Actions" (NOT "Deploy from a branch").
# If Source stays on "main" / root, the site will load /src/main.jsx and MIME errors.
#
# URL: https://gracilaj.github.io/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/copy-spa-fallback.mjs
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
