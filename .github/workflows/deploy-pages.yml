# Copies the Vite build into docs/ on main and pushes.
#
# GitHub Pages must publish THAT folder (not repo root):
#   Settings → Pages → Source: Deploy from a branch
#   Branch: main   Folder: /docs
#
# If Source is "main" + "/" (root), you will always get the MIME error (/src/main.jsx).
# "GitHub Actions" as Source is optional; this workflow does not require it.

name: Publish site to docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/copy-spa-fallback.mjs
      - name: Sync dist → docs/ and push to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          rm -rf docs
          mkdir -p docs
          cp -a dist/. docs/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes under docs/ to commit."
            exit 0
          fi
          git commit -m "chore: publish site to docs for GitHub Pages"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
