# Builds the site and commits it to main:docs/ so GitHub Pages can use
# "Deploy from branch" → main → /docs (avoids serving raw /src/main.jsx from repo root).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/copy-spa-fallback.mjs
      - name: Publish build to docs/ on main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: main
          destination_dir: docs
          keep_files: true
      - name: Pages settings reminder
        run: |
          echo "Settings → Pages → Deploy from branch → Branch: main → Folder: /docs"
